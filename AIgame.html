<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe AI</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-align: center;
    }

    h1 { margin-top: 20px; }

    #status {
        margin: 10px;
        font-size: 1.2em;
    }

    #game {
        display: grid;
        grid-template-columns: repeat(3, 110px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
    }

    .cell {
        width: 110px;
        height: 110px;
        background: white;
        color: #333;
        font-size: 2.8em;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 12px;
        transition: transform 0.2s, background 0.3s;
    }

    .cell:hover {
        transform: scale(1.08);
    }

    .pop {
        animation: pop 0.2s ease;
    }

    @keyframes pop {
        0% { transform: scale(0.5); }
        100% { transform: scale(1); }
    }

    .win {
        background: #00e676 !important;
        color: white;
        animation: glow 1s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 10px #00e676; }
        to { box-shadow: 0 0 20px #00e676; }
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1em;
        border: none;
        border-radius: 8px;
        background-color: #ffcc00;
        cursor: pointer;
    }

    button:hover {
        background-color: #ffdd33;
    }
</style>
</head>

<body>

<h1>Tic Tac Toe (vs AI)</h1>
<div id="status">Your turn (X)</div>

<div id="game">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
</div>

<button onclick="resetGame()">Restart</button>

<script>
const cells = document.querySelectorAll('.cell');
const statusText = document.getElementById('status');

let board = ["","","","","","","","",""];
let gameActive = true;

const HUMAN = "X";
const AI = "O";

const winCombos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

cells.forEach(cell => {
    cell.addEventListener('click', () => playerMove(cell));
});

function playerMove(cell) {
    const i = cell.dataset.i;
    if (board[i] || !gameActive) return;

    makeMove(i, HUMAN);

    if (gameActive) {
        statusText.textContent = "AI thinking...";
        setTimeout(aiMove, 400);
    }
}

function makeMove(i, player) {
    board[i] = player;
    cells[i].textContent = player;
    cells[i].classList.add("pop");

    checkGame();
}

function aiMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
            board[i] = AI;
            let score = minimax(board, 0, false);
            board[i] = "";
            if (score > bestScore) {
                bestScore = score;
                move = i;
            }
        }
    }

    makeMove(move, AI);
    if (gameActive) statusText.textContent = "Your turn (X)";
}

function minimax(board, depth, isMaximizing) {
    let result = checkWinner();
    if (result !== null) {
        if (result === AI) return 10 - depth;
        if (result === HUMAN) return depth - 10;
        return 0;
    }

    if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
                board[i] = AI;
                let score = minimax(board, depth + 1, false);
                board[i] = "";
                bestScore = Math.max(score, bestScore);
            }
        }
        return bestScore;
    } else {
        let bestScore = Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
                board[i] = HUMAN;
                let score = minimax(board, depth + 1, true);
                board[i] = "";
                bestScore = Math.min(score, bestScore);
            }
        }
        return bestScore;
    }
}

function checkGame() {
    let winner = checkWinner();

    if (winner) {
        statusText.textContent = (winner === HUMAN ? "You win! 🎉" : "AI wins 🤖");
        highlightWin(winner);
        gameActive = false;
        return;
    }

    if (!board.includes("")) {
        statusText.textContent = "Draw!";
        gameActive = false;
    }
}

function checkWinner() {
    for (let combo of winCombos) {
        let [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return board[a];
        }
    }
    return board.includes("") ? null : "draw";
}

function highlightWin(player) {
    winCombos.forEach(combo => {
        let [a,b,c] = combo;
        if (board[a] === player && board[b] === player && board[c] === player) {
            cells[a].classList.add("win");
            cells[b].classList.add("win");
            cells[c].classList.add("win");
        }
    });
}

function resetGame() {
    board = ["","","","","","","","",""];
    gameActive = true;
    statusText.textContent = "Your turn (X)";
    cells.forEach(cell => {
        cell.textContent = "";
        cell.classList.remove("win", "pop");
    });
}
</script>

</body>
</html>
